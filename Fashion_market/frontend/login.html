<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MISSME</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-text">MISSME</div>
            <div class="logo-sub">PRET A PORTER</div>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" data-mode="login" onclick="switchAuth('login')">登录</button>
            <button class="auth-tab" data-mode="register" onclick="switchAuth('register')">注册</button>
        </div>

        <div class="auth-form">
            <div class="auth-field">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
                <div class="field-error"></div>
            </div>

            <div id="registerFields" style="display:none">
                <div class="auth-field">
                    <label>邮箱</label>
                    <input type="email" id="email" placeholder="请输入邮箱">
                    <div class="field-error"></div>
                </div>
            </div>

            <div class="auth-field">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
                <div class="field-error"></div>
            </div>

            <button class="auth-submit" id="authSubmitBtn" onclick="handleAuth()">登 录</button>
            <div class="auth-error" id="authError"></div>
            <div class="auth-switch" id="authSwitch">
                还没有账号？<a href="#" onclick="switchAuth('register'); return false;">注册新账号</a>
            </div>
        </div>

        <div style="text-align:center;margin-top:30px">
            <a href="index.html" style="color:var(--text-light);font-size:14px">返回首页</a>
        </div>
    </div>
</div>

<div class="toast" id="toast">
    <span class="toast-icon">&#10003;</span>
    <span id="toastMsg"></span>
</div>

<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<script>
    // If already logged in, redirect to home
    const token = localStorage.getItem("token");
    if (token) {
        window.location.href = "index.html";
    }
</script>
</body>
</html>
